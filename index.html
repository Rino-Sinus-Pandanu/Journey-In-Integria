<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Learn Math With Ellia Clarissa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Metamorphous&display=swap" rel="stylesheet">

    <style> 
        .rules-box {
            margin-top: 25px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px ridge #a29bfe;
            border-radius: 10px;
            text-align: left;
            box-shadow: inset 0 0 10px rgba(162, 155, 254, 0.1);
            font-family: 'Arial', Arial, Helvetica, sans-serif, serif; 
        }

        .rules-box h3 {
            font-family: medievalsharp; serif;
            color: #ffffff;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 8px none(255, 255, 255);
            letter-spacing: 1px;
        }

        .rules-box ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Splits rules into two columns */
            gap: 10px;
        }

        .rules-box li {
            font-size: 1.0rem;
            color: #e0e0e0;
            background: #050005;
            padding: 8px;
            border-radius: 5px;
            border-left: 3px solid #a29bfe;
            border-right: 3px solid #a29bfe;
            border-top: 3px solid #a29bfe;
            border-bottom: 3px solid #a29bfe;
        }

        @media (max-width: 600px) {
            .rules-box ul {
                grid-template-columns: 1fr; /* Stacks rules on smaller screens */
            }
        }
        body { 
            font-family: 'Metamorphous', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            
            /* --- NEW BACKGROUND SETTINGS --- */
            background-image: url('https://raw.githubusercontent.com/Rino-Sinus-Pandanu/Journey-In-Integria/refs/heads/main/Ellia%20Clarissa.png'); /* Put your exact image name here! */
            background-size: cover; /* Makes the image cover the whole screen */
            background-position: center; /* Keeps the most important part of the image in the middle */
            background-attachment: fixed; /* Keeps the background still if you scroll */
            background-repeat: no-repeat; /* Prevents the image from tiling */
            /* ------------------------------- */

            color: #f0f0f0;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .box { 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(3px);
            padding: 30px; 
            border-radius: 20px; 
            border: 2px solid #a29bfe;
            box-shadow: 0 0 40px rgba(162, 155, 254, 0.5);
            width: 90%; 
            max-width: 850px; 
            text-align: center; 
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        h2 { 
            font-family: 'MedievalSharp', serif; 
            color: #ffffff; 
            text-shadow: 0 0 15px #a29bfe, 0 0 5px #fff;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-size: 2.5rem; /* Adjusting the main title size */
            
            /* ADD THIS LINE BELOW */
            line-height: 1.1; 
        }

        /* --- KODE KAMERA & ANIMASI BARU --- */
        #camera { 
            position: relative; 
            height: 190px; /* Made taller to fit the numbers */
            margin: 20px 0 40px 0; 
            width: 100%;
            overflow: hidden; 
            /* The border-bottom has been moved to the block below! */
        }

        #camera::after {
            content: '';
            position: absolute;
            bottom: 45px; /* Moves the line up to make room for numbers below */
            left: 0;
            width: 100%;
            border-bottom: 4px solid #a29bfe; 
            box-shadow: 0 5px 15px rgba(162, 155, 254, 0.4);
        }

        .long-line {
            position: absolute;
            height: 100%;
            left: 50%; /* Titik 0 selalu di tengah layar */
            /* Transisi akan diatur otomatis oleh Javascript */
        }

        @keyframes jalan {
            0%, 100% { bottom: 70px; } 
            50% { bottom: 85px; } /* A little hop into the air */
        }

        .animasi-jalan {
            animation: jalan 0.35s infinite; /* Kecepatan langkah kaki */
        }

        .tick { 
            position: absolute; 
            bottom: 45px; /* Moved up to perfectly sit on the new line */
            width: 2px; 
            height: 20px; 
            background: #a29bfe; 
        }
        
        .tick span { 
            position: absolute; 
            top: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-family: Arial, Helvetica, sans-serif; /* This changes the font to Arial */
            font-weight: bold; 
            font-size: 13px;
            color: #fff;
            text-shadow: 0 0 5px #a29bfe;
        }

        #char-wrapper { 
            position: absolute; 
            bottom: 70px; /* Moved up so she doesn't sink into the line */
            width: 70px; 
            height: 90px; 
            margin-left: -35px; 
            transition: left 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s ease; 
            z-index: 100;
        }

        .hadap-kanan { transform: scaleX(1); } 
        .hadap-kiri { transform: scaleX(-1); }  

        .controls { 
            background: rgba(20, 0, 20, 0.8); 
            padding: 20px; 
            border-radius: 12px; 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            align-items: center; 
            border: 1px solid #a29bfe;
            flex-wrap: wrap; 
        }

        input[type="number"] { width: 60px; }
        select { width: auto; max-width: 220px; }

        input, select, button { 
            padding: 10px; 
            font-size: 14px; 
            border-radius: 6px; 
            border: 1px solid #a29bfe; 
            background: #1a001a; 
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            box-sizing: border-box;
        }

        button { 
            background: #6c5ce7; 
            box-shadow: 0 0 10px #6c5ce7;
            cursor: pointer; 
            font-weight: bold;
            flex-grow: 1; 
            max-width: 200px;
            transition: 0.3s;
        }

        button:hover { 
            background: #a29bfe; 
            box-shadow: 0 0 20px #fff; 
        }

        #log { 
            margin-top: 25px; 
            text-align: left; 
            padding: 15px; 
            background: rgba(162, 155, 254, 0.1); 
            border-left: 5px solid #a29bfe; 
            min-height: 80px; 
            border-radius: 8px;
            font-size: 1rem;
            color: #e0e0e0;
            font-family: Arial, Helvetica, sans-serif; /* Add this line to change the font! */
        }

        .hl { color: #a29bfe; font-weight: bold; text-shadow: 0 0 5px #a29bfe; }
            
        .magic-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0;
            animation: magicFloat 2s infinite;
            z-index: 50;
        }

        @keyframes magicFloat {
            0% { transform: translate(0, 0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
        }
       
        .rainbow-aura {
            position: absolute;
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,0,0,0.1) 15%, rgba(255,165,0,0.1) 30%, rgba(255,255,0,0.1) 45%, rgba(0,128,0,0.1) 60%, rgba(0,0,255,0.1) 75%, rgba(75,0,130,0.1) 90%, rgba(238,130,238,0.1) 100%);
            border-radius: 50%;
            animation: rainbowPulse 3s infinite linear;
            filter: blur(5px);
        }

        @keyframes rainbowPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.1) rotate(180deg); opacity: 0.8; }
            100% { transform: scale(1) rotate(360deg); opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="box">
    <h2>
        Journey in Integria<br>
        
        <span style="font-size: 1.6rem; color: #ffc400; font-family: 'Metamorphous', serif; text-shadow: 0 0 10px rgba(255, 212, 73, 0.8);">
            Learn Mathematics with Ellia Clarissa
        </span><br>
        
        <span style="font-size: 2.0rem; color: #ffffff; font-family: 'MedievalSharp', serif; text-shadow: white;">
            (by Rino Sinus Pandanu)
        </span>
    </h2>
    
    <div id="camera">
        <div class="long-line" id="line">
            
            <div id="char-wrapper" class="hadap-kanan">
                <div class="rainbow-aura"></div>
                <div class="magic-particle" style="background: #ff4d4d; --dx: -20px; --dy: -30px; animation-delay: 0s;"></div>
                <div class="magic-particle" style="background: #4dff4d; --dx: 20px; --dy: -40px; animation-delay: 0.5s;"></div>
                <div class="magic-particle" style="background: #4d4dff; --dx: 10px; --dy: -20px; animation-delay: 1s;"></div>
                <div class="magic-particle" style="background: #ffff4d; --dx: -15px; --dy: -50px; animation-delay: 1.5s;"></div>
                
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 50 5 L 20 40 L 80 40 Z" fill="#000000" stroke="#a29bfe" stroke-width="1"/>
                    <path d="M 15 40 L 85 40 L 85 45 L 15 45 Z" fill="#1a001a" />
                    <circle cx="50" cy="55" r="12" fill="#ffeaa7" />
                    <circle cx="58" cy="52" r="2" fill="#000" />
                    <path d="M 50 67 L 25 95 L 75 95 Z" fill="#000000" stroke="#a29bfe" stroke-width="1"/>
                    <line x1="65" y1="50" x2="85" y2="20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="85" cy="20" r="6" fill="#fff">
                        <animate attributeName="fill" values="#ff4d4d;#4dff4d;#4d4dff;#ffff4d;#ff4d4d" dur="2s" repeatCount="indefinite" />
                        <animate attributeName="r" values="5;7;5" dur="1s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>

        </div>
    </div>

    <div class="controls">
        <input type="number" id="v1" value="-3">
        <select id="op">
            <option value="+">TAMBAH (MAJU)</option>
            <option value="-">KURANG (MUNDUR)</option>
        </select>
        <input type="number" id="v2" value="-5">
        <button id="btnRun" onclick="jalankan()">RAPALKAN MANTRA!</button>
        <button onclick="location.reload()" style="background:#444; border-color:#666; box-shadow:none;">RESET</button>
    </div>

    <div id="log">🪄 Siapkan mantra Anda...</div>
    <div class="rules-box">
        <h3>ATURAN DASAR MANTRA</h3>
        <ul>
            <li><span class="hl">(+) PENJUMLAHAN</span> = MELANGKAH <b>MAJU</b></li>
            <li><span class="hl">(-) PENGURANGAN</span> = MELANGKAH <b>MUNDUR</b></li>
            <li><span class="hl">BILANGAN POSITIF</span> = MENGHADAP <b>KANAN</b></li>
            <li><span class="hl">BILANGAN NEGATIF</span> = MENGHADAP <b>KIRI</b></li>
        </ul>
    </div>
</div>

<script>
    const camera = document.getElementById('camera');
    const line = document.getElementById('line');
    const char = document.getElementById('char-wrapper');
    const log = document.getElementById('log');
    const btn = document.getElementById('btnRun');
    
    const range = 100; // Garis bilangan kini dari -100 sampai 100!
    const jarakPixels = 45; // Jarak antar angka (dalam pixel)

    // Membuat deretan angka
    for (let i = -range; i <= range; i++) {
        const t = document.createElement('div');
        t.className = 'tick';
        t.style.left = (i * jarakPixels) + 'px'; 
        
        if (i === 0) {
            t.innerHTML = `<span style="color: #ff4d4d; text-shadow: 0 0 8px #ff4d4d; font-size: 15px; font-family: Arial; font-weight: bold;">${i}</span>`;
        } else {
            t.innerHTML = `<span style="font-family: Arial; font-weight: bold; font-size: 15px;">${i}</span>`;
        }
        line.appendChild(t);
    }

    // Fungsi canggih untuk menggeser karakter sekaligus kamera
    function aturPosisi(angka, durasi) {
        line.style.transition = `transform ${durasi}s ease-in-out`;
        char.style.transition = `left ${durasi}s ease-in-out, transform 0.5s ease`;
        
        char.style.left = (angka * jarakPixels) + 'px';
        // Kamera bergeser ke arah berlawanan agar Ellia selalu di tengah!
        line.style.transform = `translateX(${-(angka * jarakPixels)}px)`; 
    }

    // Menempatkan posisi saat web pertama kali dibuka (Selalu di 0)
    setTimeout(() => {
        aturPosisi(0, 0); // This forces Ellia and the camera to start exactly at 0
        char.className = "hadap-kanan"; // Default facing right
    }, 100);

    async function jalankan() {
        btn.disabled = true;
        const a = parseInt(document.getElementById('v1').value) || 0;
        const o = document.getElementById('op').value;
        const b = parseInt(document.getElementById('v2').value) || 0;

        // 1. Portal Awal
        log.innerHTML = `🔮 1. Ellia Clarissa bersiap di titik <span class='hl'>${a}</span>.`;
        aturPosisi(a, 0.8); // Bergerak cepat jika posisi awal diubah manual
        char.className = (a >= 0) ? "hadap-kanan" : "hadap-kiri";
        await new Promise(r => setTimeout(r, 1000));

        // 2. Arah Hadap
        const h2 = (b >= 0) ? "hadap-kanan" : "hadap-kiri";
        char.className = h2;
        log.innerHTML += `<br>🔋 2. Energi <span class='hl'>${b}</span>: Ellia Clarissa <span class='hl'>MENGHADAP ${b >= 0 ? 'KANAN' : 'KIRI'}</span>.`;
        await new Promise(r => setTimeout(r, 1200));

        // 3. Mantra Berjalan
        const aksi = (o === "+") ? "MELANGKAH MAJU" : "MELANGKAH MUNDUR";
        log.innerHTML += `<br>✨ 3. Mantra <span class='hl'>${o === '+' ? 'TAMBAH' : 'KURANG'}</span>! Ellia Clarissa <span class='hl'>${aksi} perlahan</span>...`;
        
        const hasil = (o === "+") ? (a + b) : (a - b);
        
        // Hitung durasi (makin jauh jaraknya, makin lama jalannya)
        const jarakLangkah = Math.abs(hasil - a);
        const waktuJalan = Math.max(2, jarakLangkah * 0.5); 
        
        char.classList.add("animasi-jalan"); // Mulai animasi jalan
        
        aturPosisi(hasil, waktuJalan); // Mulai melangkah perlahan
        
        await new Promise(r => setTimeout(r, waktuJalan * 1000)); // Tunggu sampai tiba
        
        char.classList.remove("animasi-jalan"); // Berhenti berjalan

        log.innerHTML += `<br><br><b>🏁 HASIL: Mantra berhenti di titik ${hasil}!</b>`;
        btn.disabled = false;
    }
</script>
</body>
</html>
